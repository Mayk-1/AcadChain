<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AcadChain — Iniciar sesión</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #10151f;
    --ink-2: #182033;
    --parchment: #fbf6ec;
    --parchment-deep: #e8ddc4;
    --brass: #ab7f1e;
    --brass-bright: #c9a227;
    --verdigris: #3a6d65;
    --ash: #9aa3b6;
    --ash-dim: #6b7386;
    --alert: #e08b93;
    --alert-bg: rgba(156,58,68,0.14);
    --alert-border: rgba(156,58,68,0.4);

    --font-display: "Fraunces", serif;
    --font-body: "Inter", sans-serif;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; font-family: var(--font-body); min-height: 100vh; background: var(--ink); }
  ::selection { background: var(--brass-bright); color: var(--ink); }
  :focus-visible { outline: 2px solid var(--brass-bright); outline-offset: 3px; }

  .contenedor {
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    padding: 24px;
  }

  .caja {
    width: 100%; max-width: 380px;
    background: var(--ink-2); border: 1px solid rgba(255,255,255,0.08);
    border-radius: 14px; padding: 40px 34px;
  }

  .brand-row { display: flex; align-items: center; gap: 12px; justify-content: center; margin-bottom: 6px; }
  .mark { width: 32px; height: 32px; }
  .brand { font-family: var(--font-display); font-size: 19px; font-weight: 600; color: var(--parchment); }
  .brand span { color: var(--brass-bright); }

  h1 {
    font-family: var(--font-display); font-weight: 600; font-size: 21px; color: var(--parchment);
    text-align: center; margin: 22px 0 4px;
  }
  .sub { text-align: center; font-size: 13px; color: var(--ash); margin: 0 0 30px; }

  .field { margin-bottom: 18px; }
  label {
    display: block; font-size: 12px; text-transform: uppercase; letter-spacing: 0.08em;
    color: var(--ash-dim); font-weight: 600; margin-bottom: 9px;
  }
  input[type="text"], input[type="password"] {
    width: 100%; background: var(--ink); border: 1px solid rgba(255,255,255,0.12); border-radius: 8px;
    padding: 13px 14px; font-family: var(--font-body); font-size: 14.5px; color: var(--parchment);
  }
  input:focus { border-color: var(--verdigris); }
  input::placeholder { color: #4a5266; }

  .submit-btn {
    margin-top: 8px; width: 100%; background: var(--brass-bright); color: var(--ink); border: none;
    padding: 14px; border-radius: 8px; font-family: var(--font-body); font-weight: 700; font-size: 14.5px;
    cursor: pointer; transition: background 0.2s ease;
  }
  .submit-btn:hover:not(:disabled) { background: #dcbb4e; }
  .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  .spinner {
    display: inline-block; width: 14px; height: 14px; border: 2px solid rgba(16,21,31,0.3);
    border-top-color: var(--ink); border-radius: 50%; animation: spin 0.7s linear infinite;
    vertical-align: -2px; margin-right: 7px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .error-box {
    display: none; margin-bottom: 18px; padding: 11px 13px;
    background: var(--alert-bg); border: 1px solid var(--alert-border); border-radius: 8px;
    font-size: 13px; color: var(--alert);
  }
  .error-box.mostrar { display: block; }

  .volver { display: block; text-align: center; margin-top: 26px; font-size: 12.5px; color: var(--ash-dim); text-decoration: none; }
  .volver:hover { color: var(--ash); }
</style>
</head>
<body>

<div class="contenedor">
  <div class="caja">
    <div class="brand-row">
      <svg class="mark" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="20" cy="20" r="19" stroke="#c9a227" stroke-width="1.5"/>
        <path d="M20 8 L30 13.5 V26.5 L20 32 L10 26.5 V13.5 Z" stroke="#3a6d65" stroke-width="1.4"/>
        <circle cx="20" cy="20" r="4" fill="#c9a227"/>
      </svg>
      <div class="brand">Acad<span>Chain</span></div>
    </div>

    <h1>Acceso de autoridad</h1>
    <p class="sub">Inicia sesión para registrar certificados y sellar bloques.</p>

    <div class="error-box" id="error-box"></div>

    <form id="form-login">
      <div class="field">
        <label for="input-usuario">Usuario</label>
        <input type="text" id="input-usuario" autocomplete="username" required>
      </div>
      <div class="field">
        <label for="input-password">Contraseña</label>
        <input type="password" id="input-password" autocomplete="current-password" required>
      </div>
      <button class="submit-btn" type="submit" id="btn-login">Iniciar sesión</button>
    </form>

    <a class="volver" href="verificar.html">← Volver a verificación pública</a>
  </div>
</div>

<script>
  const API_BASE_URL = "http://127.0.0.1:8000";

  // Si ya hay una sesión activa, saltar directo al panel de registro
  if (sessionStorage.getItem('acadchain_token')) {
    window.location.href = 'registrar.html';
  }

  const form = document.getElementById('form-login');
  const errorBox = document.getElementById('error-box');
  const btn = document.getElementById('btn-login');

  function mostrarError(msg) {
    errorBox.textContent = msg;
    errorBox.classList.add('mostrar');
  }

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    errorBox.classList.remove('mostrar');

    const username = document.getElementById('input-usuario').value.trim();
    const password = document.getElementById('input-password').value;

    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>Ingresando…';

    try {
      const res = await fetch(`${API_BASE_URL}/api/login/`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      });
      const data = await res.json();

      if (res.ok) {
        sessionStorage.setItem('acadchain_token', data.token);
        sessionStorage.setItem('acadchain_usuario', data.username);
        window.location.href = 'registrar.html';
      } else {
        mostrarError(data.error || 'No se pudo iniciar sesión.');
      }
    } catch (err) {
      mostrarError('No se pudo conectar con el servidor. Confirma que el backend Django esté corriendo.');
    } finally {
      btn.disabled = false;
      btn.textContent = 'Iniciar sesión';
    }
  });
</script>
</body>
</html>
